<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afterparty Digital - Event Networking Platform</title>
  <meta name="description"
    content="A complete, production-ready web application for hackathons. The domain is afterparty.digital." />

  <!-- External Libraries & Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

  <!-- Google Fonts: Outfit & Space Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet">

  <!-- Custom Stylesheets (Loaded last to take precedence) -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/realms.css">
  <link rel="stylesheet" href="styles/animations.css">

  <script>
    (function () {
      const redirect = new URLSearchParams(location.search).get('redirect');
      if (redirect && redirect !== location.pathname) {
        history.replaceState(null, '', redirect);
      }
    })();
  </script>

  <!-- Import Map for Clean Module Paths -->
  <script type="importmap">
    {
      "imports": {
        "./js/": "./js/"
      }
    }
  </script>
</head>

<body class="min-h-screen" style="height: 600vh;">

  <!-- Loading State Overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loader">Descending into caverns...</div>
  </div>

  <!-- Development Dashboard Tool panel -->
  <div id="dev-dashboard" class="dev-dashboard">
    <button onclick="localStorage.clear(); sessionStorage.clear(); location.reload();">Clear Session</button>
    <button onclick="console.log('Active State:', window.appState || 'State not loaded');">Show State</button>
    <button onclick="resetDatabase()">Wipe Database</button>
  </div>

  <!-- Parallax Cavern Background -->
  <div id="parallax-bg">
    <!-- Ambient Dust Particles -->
    <div class="dust-particle" style="width: 5px; height: 5px; left: 15%; top: 20%; --x-shift: 25px;"></div>
    <div class="dust-particle"
      style="width: 3.5px; height: 3.5px; left: 45%; top: 15%; --x-shift: -20px; animation-delay: 1.5s;"></div>
    <div class="dust-particle"
      style="width: 4.5px; height: 4.5px; left: 75%; top: 30%; --x-shift: 30px; animation-delay: 3s;"></div>
    <div class="dust-particle"
      style="width: 3.5px; height: 3.5px; left: 25%; top: 75%; --x-shift: -15px; animation-delay: 2.2s;"></div>
    <div class="dust-particle"
      style="width: 5px; height: 5px; left: 60%; top: 65%; --x-shift: 20px; animation-delay: 0.7s;"></div>
    <div class="dust-particle"
      style="width: 4.5px; height: 4.5px; left: 85%; top: 80%; --x-shift: -25px; animation-delay: 4.5s;"></div>
  </div>

  <!-- Fixed Header -->
  <div id="header-container"></div>

  <!-- Diagonal Scroll Container (Translates horizontally and vertically) -->
  <div id="scroll-container">

    <!-- Dynamic SVG Railroad Track -->
    <svg id="rail-svg" class="absolute top-0 left-0 w-full h-full pointer-events-none" style="z-index: 5;"
      viewBox="0 0 6000 4200" preserveAspectRatio="none">
      <!-- Dark track shadow bed -->
      <path d="M 50,800 L 5850,3800" stroke="rgba(4, 3, 10, 0.3)" stroke-width="32" stroke-linecap="round"
        fill="none" />

      <!-- Sleeper group (dynamically populated by JS) -->
      <g id="sleepers-group"></g>

      <!-- Steel Rails -->
      <!-- Left Rail -->
      <path d="M 50,800 L 5850,3800" transform="translate(-5, 12)" stroke="#475569" stroke-width="4.5"
        stroke-linecap="round" fill="none" class="drop-shadow-[0_0_8px_rgba(148,163,184,0.3)]" />
      <path d="M 50,800 L 5850,3800" transform="translate(-5, 12)" stroke="#cbd5e1" stroke-width="1.8"
        stroke-linecap="round" fill="none" />
      <!-- Right Rail -->
      <path d="M 50,800 L 5850,3800" transform="translate(5, -12)" stroke="#475569" stroke-width="4.5"
        stroke-linecap="round" fill="none" class="drop-shadow-[0_0_8px_rgba(148,163,184,0.3)]" />
      <path d="M 50,800 L 5850,3800" transform="translate(5, -12)" stroke="#cbd5e1" stroke-width="1.8"
        stroke-linecap="round" fill="none" />
    </svg>

    <!-- Hidden Gemstones (Easter Eggs) -->
    <!-- Gem 1 (Launch room top right) -->
    <div class="hidden-gem" onclick="collectHiddenGem(this, event)" style="left: 88vw; top: 12vh;"
      title="Hidden Amethyst">
      <svg viewBox="0 0 100 100" class="w-10 h-10 drop-shadow-[0_0_8px_rgba(168,85,247,0.7)]">
        <polygon points="50,10 80,35 80,65 50,90 20,65 20,35" fill="#c084fc" />
        <polygon points="50,10 50,90 20,65" fill="rgba(255,255,255,0.25)" />
        <polygon points="50,10 80,35 50,50" fill="rgba(255,255,255,0.35)" />
      </svg>
    </div>
    <!-- Gem 2 (Amethyst mine floor) -->
    <div class="hidden-gem" onclick="collectHiddenGem(this, event)" style="left: 104vw; top: 82vh;"
      title="Hidden Amethyst">
      <svg viewBox="0 0 100 100" class="w-10 h-10 drop-shadow-[0_0_8px_rgba(168,85,247,0.7)]">
        <polygon points="50,10 80,35 80,65 50,90 20,65 20,35" fill="#c084fc" />
        <polygon points="50,10 50,90 20,65" fill="rgba(255,255,255,0.25)" />
        <polygon points="50,10 80,35 50,50" fill="rgba(255,255,255,0.35)" />
      </svg>
    </div>



    <!-- Realm Containers -->
    <section class="realm px-8 md:px-20" id="realm-1"></section>
    <section class="realm px-8 md:px-20" id="realm-2"></section>
    <section class="realm px-8 md:px-20" id="realm-3"></section>
    <section class="realm px-8 md:px-20" id="realm-4"></section>
    <section class="realm px-8 md:px-20" id="realm-5"></section>
    <section class="realm px-8 md:px-20" id="realm-6"></section>
  </div>

  <!-- Pinned mini-footer -->
  <div id="footer-container"></div>

  <!-- Modals Mount Point -->
  <div id="modal-container"></div>

  <!-- Entry Script Point -->
  <script type="module" src="js/main.js"></script>

  <!-- Minecart Progress Indicator at viewport bottom -->
  <div id="cart-container" class="minecart-goose" style="left: 5vw;">
    <img src="./crystal_goose.png" alt="Minecart Goose" class="w-16 h-16 object-contain"
      onerror="this.src='https://miaoda-preview-img.cdn.bcebos.com/preview.png'">
  </div>

  <!-- Floating Back to Surface Arrow Button -->
  <button id="back-to-top" onclick="scrollToTop(event)"
    class="fixed bottom-6 right-6 z-50 p-4 bg-gradient-to-tr from-[#FF007F] to-[#00FFFF] text-slate-950 font-black rounded-full shadow-2xl transition-all scale-0 opacity-0 duration-300 hover:scale-110 flex items-center justify-center pointer-events-auto">
    <i class="fas fa-arrow-up text-lg"></i>
  </button>

</body>

</html>
